name: Fetch VNA Diário (Anbima & Tesouro)

on:
  schedule:
    - cron: "0 11 * * 1-5"
  workflow_dispatch:

jobs:
  update-vna:
    runs-on: ubuntu-latest
    # --- ADD THIS SECTION ---
    permissions:
      contents: write
    # ------------------------
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4 # Updated to v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar Dependências e Playwright
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Executar Script de VNA
        run: python scripts/td_vna_diario.py

      - name: Commit e Push dos Arquivos DB (JSON/XML)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/vna_atual.xml output/vna_diario.json output/vna_historico.json
          # Only commit if there are changes to avoid empty commit errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: atualiza bases de dados do VNA" && git push)
