name: TD Hist Scraped (Daily Append)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * 1-5"  # 22:00 UTC = 19:00 BRT (Mon-Fri)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history so git logs are accurate 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Scraped Appender
        run: python scripts/td_scraped_to_hist.py --daily

      - name: Commit and push if changed
        run: |
          git config user.name "td-bot"
          git config user.email "td-bot@users.noreply.github.com"
          git add output/td_hist.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Append daily scraped data to TD hist JSON"
            git push
          fi